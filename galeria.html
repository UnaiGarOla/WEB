<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GARUNA SITE</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
        }

        /* HEADER */
        .header {
            background-color: #e0e0e0;
            padding: 50px 20px;
            text-align: center;
        }

        /* 1. SLIDESHOW (Mantenemos tu estilo original) */
        .slideshow-container {
            width: 100%;
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .slideshow {
            width: 100%;
            background-color: #333;
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 27 / 9;
            display: flex;
        }

        .slideshow img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 2. CONTENIDO Y GALERÍA ESTILO PINTEREST */
        /* He ajustado el max-width a 1200px para que la galería luzca mejor que en 850px */
        .contenido {
            width: 100%;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* ESTE ES EL CONTENEDOR DE LAS FOTOS */
        .pinterest-gallery {
            column-count: 4;
            /* 4 columnas en PC */
            column-gap: 15px;
            width: 100%;
        }

        /* Cada tarjeta de foto */
        .pin {
            display: inline-block;
            /* Evita que la foto se parta entre columnas */
            width: 100%;
            margin-bottom: 15px;
            border-radius: 12px;
            overflow: hidden;
            background-color: #eee;
            transition: transform 0.3s ease;
        }

        .pin:hover {
            transform: scale(1.02);
        }

        .pin img {
            width: 100%;
            display: block;
            height: auto;
            border-radius: 12px;
        }

        /* AJUSTES RESPONSIVE */
        @media (max-width: 1024px) {
            .pinterest-gallery {
                column-count: 3;
                /* 3 columnas en tablets */
            }
        }

        @media (max-width: 768px) {
            .slideshow-container {
                padding: 0;
                margin-top: 0;
            }

            .slideshow {
                border-radius: 0;
                aspect-ratio: 1 / 1;
            }

            .contenido {
                margin-top: 20px;
                padding: 0 10px;
            }

            .pinterest-gallery {
                column-count: 2;
                /* 2 columnas en móvil (estilo Pinterest App) */
                column-gap: 10px;
            }

            .pin {
                margin-bottom: 10px;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <h1 id="inicio">GARUNA SITE</h1>
    </div>
    <div class="slideshow"></div>
    <!-- CONTENIDO -->
    <div class="contenido">
        <div class="pinterest-gallery"></div>
    </div>

    <!-- PRIMERO: menú -->
    <script src="program_files/index/menu.js"></script>

    <!-- LUEGO: slider -->
    <script src="media/galeria/lista_fotos.js"></script>
    <script src="program_files/index/picture_slide.js"></script>
    <script src="program_files/galeria/galeria_completa.js"></script>

</body>

</html>
